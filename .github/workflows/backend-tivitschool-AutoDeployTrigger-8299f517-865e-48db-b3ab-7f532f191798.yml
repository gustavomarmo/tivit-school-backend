name: Trigger auto deployment for backend-tivitschool

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/backend-tivitschool-AutoDeployTrigger-8299f517-865e-48db-b3ab-7f532f191798.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.BACKENDTIVITSCHOOL_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.BACKENDTIVITSCHOOL_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.BACKENDTIVITSCHOOL_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acrtivitschool.azurecr.io
          registryUsername: ${{ secrets.BACKENDTIVITSCHOOL_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BACKENDTIVITSCHOOL_REGISTRY_PASSWORD }}
          containerAppName: backend-tivitschool
          resourceGroup: rg-tivitschool
          imageToBuild: acrtivitschool.azurecr.io/backend-tivitschool:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


